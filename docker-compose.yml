services:
  dokploy-mcp-http:
    build: .
    container_name: dokploy-mcp-http
    ports:
      - "${EXTERNAL_PORT:-5000}:3000"
    environment:
      - MCP_TRANSPORT=${MCP_TRANSPORT:-http}
      - DOKPLOY_URL=${DOKPLOY_URL}
      - DOKPLOY_API_KEY=${DOKPLOY_API_KEY}
    restart: unless-stopped
    networks:
      - mcp-network

  dokploy-mcp-stdio:
    build: .
    container_name: dokploy-mcp-stdio
    environment:
      - DOKPLOY_URL=${DOKPLOY_URL}
      - DOKPLOY_API_KEY=${DOKPLOY_API_KEY}
    restart: "no"
    stdin_open: true
    tty: true
    networks:
      - mcp-network

networks:
  mcp-network:
    driver: bridge
